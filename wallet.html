<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Economizy - Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0F172A',
                            primary: '#B46445',
                            secondary: '#F5F2EF',
                            accent: '#3B82F6',
                            surface: '#FFFFFF',
                            text: '#1E293B',
                            muted: '#94A3B8',
                            error: '#EF4444',
                            success: '#10B981',
                            warning: '#F59E0B'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-black font-sans text-white h-screen overflow-hidden flex flex-col items-center justify-center">

    <div id="app-container" class="w-full h-full md:max-w-[480px] md:max-h-[850px] md:h-[90vh] bg-brand-dark md:rounded-[40px] shadow-2xl overflow-hidden relative flex flex-col">
        
        <div class="absolute inset-0 z-0 pointer-events-none">
            <div class="absolute inset-0 bg-gradient-to-b from-brand-dark via-gray-900 to-black"></div>
        </div>

        <div id="header" class="relative z-30 pt-12 pb-4 px-6 flex justify-between items-center bg-brand-dark/80 backdrop-blur-md border-b border-white/5">
            <button onclick="window.location.href='profile.html'" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10">
                <i class="fa-solid fa-chevron-left text-white/70"></i>
            </button>
            <span class="text-sm font-semibold tracking-wider text-white uppercase">My Wallet</span>
            <div class="w-10 h-10"></div>
        </div>

        <main class="relative z-10 flex-1 overflow-y-auto w-full hide-scrollbar pb-24">
            <div class="px-4 space-y-6 pt-4">
                
                <!-- Balance Card -->
                <div class="glass-card rounded-2xl p-6 text-center">
                    <p class="text-sm text-brand-muted uppercase tracking-widest">Total Balance</p>
                    <p class="text-4xl font-bold text-white mt-2">R$ 128,50</p>
                    <p class="text-xs text-green-400 mt-1">+ R$ 12,85 cashback this month</p>
                </div>

                <!-- Actions -->
                <div class="grid grid-cols-2 gap-4">
                    <button class="glass-card rounded-xl p-4 flex flex-col items-center justify-center gap-2 hover:bg-white/10">
                        <i class="fa-solid fa-money-bill-transfer text-xl text-brand-accent"></i>
                        <span class="text-xs font-semibold">Withdraw</span>
                    </button>
                    <button class="glass-card rounded-xl p-4 flex flex-col items-center justify-center gap-2 hover:bg-white/10">
                        <i class="fa-solid fa-plus text-xl text-brand-accent"></i>
                        <span class="text-xs font-semibold">Add Funds</span>
                    </button>
                </div>

                <!-- Recent Activity -->
                <div>
                    <h3 class="text-sm font-semibold text-white/90 uppercase tracking-wide px-2">Recent Activity</h3>
                    <div class="mt-2 space-y-2">
                        <!-- Transaction Item 1 -->
                        <div class="glass-card rounded-xl p-3 flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-green-500/20 flex items-center justify-center">
                                <i class="fa-solid fa-gift text-green-400"></i>
                            </div>
                            <div class="flex-1">
                                <p class="font-semibold text-sm text-white">Cashback Earned</p>
                                <p class="text-xs text-brand-muted">From purchase at Magazine Luiza</p>
                            </div>
                            <div class="text-right">
                                <p class="font-bold text-sm text-green-400">+ R$ 5,30</p>
                                <p class="text-xs text-brand-muted">Mar 01</p>
                            </div>
                        </div>
                        <!-- Transaction Item 2 -->
                        <div class="glass-card rounded-xl p-3 flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-red-500/20 flex items-center justify-center">
                                <i class="fa-solid fa-arrow-up-from-bracket text-red-400"></i>
                            </div>
                            <div class="flex-1">
                                <p class="font-semibold text-sm text-white">Withdrawal</p>
                                <p class="text-xs text-brand-muted">To bank account</p>
                            </div>
                            <div class="text-right">
                                <p class="font-bold text-sm text-red-400">- R$ 50,00</p>
                                <p class="text-xs text-brand-muted">Feb 28</p>
                            </div>
                        </div>
                        <!-- Transaction Item 3 -->
                        <div class="glass-card rounded-xl p-3 flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-green-500/20 flex items-center justify-center">
                                <i class="fa-solid fa-gift text-green-400"></i>
                            </div>
                            <div class="flex-1">
                                <p class="font-semibold text-sm text-white">Cashback Earned</p>
                                <p class="text-xs text-brand-muted">From purchase at Amazon</p>
                            </div>
                            <div class="text-right">
                                <p class="font-bold text-sm text-green-400">+ R$ 7,55</p>
                                <p class="text-xs text-brand-muted">Feb 25</p>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>

        <div class="absolute bottom-0 left-0 right-0 h-[80px] bg-black/40 backdrop-blur-xl border-t border-white/10 flex items-center justify-between px-6 pb-2 z-50">
            <button onclick="window.location.href='scan.html'" class="flex-1 flex flex-col items-center justify-center gap-1 h-full text-white/50 hover:text-white transition-colors">
                <i class="fa-solid fa-expand text-xl"></i>
                <span class="text-[10px] font-medium">Scan</span>
            </button>
            <button onclick="window.location.href='search.html'" class="flex-1 flex flex-col items-center justify-center gap-1 h-full text-white/50 hover:text-white transition-colors">
                <i class="fa-solid fa-magnifying-glass text-xl"></i>
                <span class="text-[10px] font-medium">Search</span>
            </button>
            <button onclick="window.location.href='history.html'" class="flex-1 flex flex-col items-center justify-center gap-1 h-full text-white/50 hover:text-white transition-colors">
                <i class="fa-solid fa-clock-rotate-left text-xl"></i>
                <span class="text-[10px] font-medium">History</span>
            </button>
            <button onclick="window.location.href='wallet.html'" class="flex-1 flex flex-col items-center justify-center gap-1 h-full text-brand-primary">
                <i class="fa-solid fa-wallet text-xl"></i>
                <span class="text-[10px] font-semibold">Wallet</span>
            </button>
            <button onclick="window.location.href='profile.html'" class="flex-1 flex flex-col items-center justify-center gap-1 h-full text-white/50 hover:text-white transition-colors">
                <div class="w-6 h-6 rounded-full bg-white/20 overflow-hidden">
                    <img class="w-full h-full object-cover" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/2ddcd57b42-cef58db7c62a5f990a82.png" alt="Profile" />
                </div>
                <span class="text-[10px] font-medium">Profile</span>
            </button>
        </div>
    </div>
</body>
</html>
