<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromoScan - Price Alerts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0F172A',
                            primary: '#B46445',
                            secondary: '#F5F2EF',
                            accent: '#3B82F6',
                            surface: '#FFFFFF',
                            text: '#1E293B',
                            muted: '#94A3B8',
                            error: '#EF4444',
                            success: '#10B981',
                            warning: '#F59E0B'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* Toggle Switch Styles */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #3B82F6;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #3B82F6;
        }
    </style>
</head>
<body class="bg-black font-sans text-white h-screen overflow-hidden flex flex-col items-center justify-center">

    <div id="app-container" class="w-full h-full md:max-w-[480px] md:max-h-[850px] md:h-[90vh] bg-brand-dark md:rounded-[40px] shadow-2xl overflow-hidden relative flex flex-col">
        
        <div class="absolute inset-0 z-0 pointer-events-none">
            <div class="absolute inset-0 bg-gradient-to-b from-brand-dark via-gray-900 to-black"></div>
        </div>

        <div id="header" class="relative z-30 pt-12 pb-4 px-6 flex justify-between items-center bg-brand-dark/80 backdrop-blur-md border-b border-white/5">
            <button onclick="window.location.href='profile.html'" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10">
                <i class="fa-solid fa-chevron-left text-white/70"></i>
            </button>
            <span class="text-sm font-semibold tracking-wider text-white uppercase">Price Alerts</span>
            <div class="w-10 h-10"></div>
        </div>

        <main class="relative z-10 flex-1 overflow-y-auto w-full hide-scrollbar pb-24">
            <div class="px-4 space-y-4 pt-4">
                
                <button class="w-full glass-card rounded-xl p-4 flex items-center justify-center gap-3 text-brand-accent hover:bg-brand-accent/10 border-brand-accent/20 hover:border-brand-accent/50 transition-colors">
                    <i class="fa-solid fa-plus"></i>
                    <span class="font-semibold">Create New Alert</span>
                </button>

                <!-- Alert Item 1 -->
                <div class="glass-card rounded-xl p-3">
                    <div class="flex gap-3 items-center">
                        <div class="w-16 h-16 rounded-lg bg-white/5 border border-white/10 flex-shrink-0">
                            <img class="w-full h-full object-contain" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/6a72ced7af-4be359f0ffb2701da65e.png" alt="Sony WH-1000XM5">
                        </div>
                        <div class="flex-1">
                            <h4 class="font-semibold text-white text-sm">Sony WH-1000XM5</h4>
                            <p class="text-xs text-brand-muted mt-1">Notify when price is below <span class="font-bold text-white">$349.99</span></p>
                        </div>
                    </div>
                    <div class="mt-3 pt-3 border-t border-white/10 flex justify-between items-center">
                        <span class="text-xs text-brand-success font-medium">Active</span>
                        <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                            <input type="checkbox" name="toggle" id="toggle1" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer" checked/>
                            <label for="toggle1" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-700 cursor-pointer"></label>
                        </div>
                    </div>
                </div>

                <!-- Alert Item 2 -->
                <div class="glass-card rounded-xl p-3">
                    <div class="flex gap-3 items-center">
                        <div class="w-16 h-16 rounded-lg bg-white/5 border border-white/10 flex-shrink-0">
                            <img class="w-full h-full object-contain" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/d57ec656e3-7a73e702a69b43a89b40.png" alt="iPhone 15 Pro">
                        </div>
                        <div class="flex-1">
                            <h4 class="font-semibold text-white text-sm">Apple iPhone 15 Pro</h4>
                            <p class="text-xs text-brand-muted mt-1">Notify when price is below <span class="font-bold text-white">$900.00</span></p>
                        </div>
                    </div>
                    <div class="mt-3 pt-3 border-t border-white/10 flex justify-between items-center">
                        <span class="text-xs text-brand-muted font-medium">Inactive</span>
                         <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                            <input type="checkbox" name="toggle" id="toggle2" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer"/>
                            <label for="toggle2" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-700 cursor-pointer"></label>
                        </div>
                    </div>
                </div>

                 <!-- Empty State Placeholder -->
                <div class="hidden pt-12 text-center">
                    <i class="fa-solid fa-bell-slash text-4xl text-white/20"></i>
                    <p class="mt-4 text-sm text-white/60">You have no active price alerts.</p>
                    <p class="text-xs text-white/40">Create one to get notified about price drops.</p>
                </div>

            </div>
        </main>

        <div class="absolute bottom-0 left-0 right-0 h-[80px] bg-black/40 backdrop-blur-xl border-t border-white/10 flex items-center justify-between px-6 pb-2 z-50">
            <button onclick="window.location.href='scan.html'" class="flex-1 flex flex-col items-center justify-center gap-1 h-full text-white/50 hover:text-white transition-colors">
                <i class="fa-solid fa-expand text-xl"></i>
                <span class="text-[10px] font-medium">Scan</span>
            </button>
            <button onclick="window.location.href='search.html'" class="flex-1 flex flex-col items-center justify-center gap-1 h-full text-white/50 hover:text-white transition-colors">
                <i class="fa-solid fa-magnifying-glass text-xl"></i>
                <span class="text-[10px] font-medium">Search</span>
            </button>
            <button onclick="window.location.href='history.html'" class="flex-1 flex flex-col items-center justify-center gap-1 h-full text-white/50 hover:text-white transition-colors">
                <i class="fa-solid fa-clock-rotate-left text-xl"></i>
                <span class="text-[10px] font-medium">History</span>
            </button>
            <button onclick="window.location.href='wallet.html'" class="flex-1 flex flex-col items-center justify-center gap-1 h-full text-white/50 hover:text-white transition-colors">
                <i class="fa-solid fa-wallet text-xl"></i>
                <span class="text-[10px] font-medium">Wallet</span>
            </button>
            <button onclick="window.location.href='profile.html'" class="flex-1 flex flex-col items-center justify-center gap-1 h-full text-brand-primary">
                <div class="w-6 h-6 rounded-full bg-white/20 overflow-hidden border-2 border-brand-primary">
                    <img class="w-full h-full object-cover" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/2ddcd57b42-cef58db7c62a5f990a82.png" alt="Profile" />
                </div>
                <span class="text-[10px] font-semibold">Profile</span>
            </button>
        </div>
    </div>
</body>
</html>
