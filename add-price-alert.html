<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromoScan - Add Price Alert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0F172A',
                            primary: '#B46445',
                            secondary: '#F5F2EF',
                            accent: '#3B82F6',
                            surface: '#FFFFFF',
                            text: '#1E293B',
                            muted: '#94A3B8',
                            error: '#EF4444',
                            success: '#10B981',
                            warning: '#F59E0B'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/gh/plentz/jquery-maskmoney@master/dist/jquery.maskMoney.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-black font-sans text-white h-screen overflow-hidden flex flex-col items-center justify-center">

    <div id="app-container" class="w-full h-full md:max-w-[480px] md:max-h-[850px] md:h-[90vh] bg-brand-dark md:rounded-[40px] shadow-2xl overflow-hidden relative flex flex-col">
        
        <div class="absolute inset-0 z-0 pointer-events-none">
            <div class="absolute inset-0 bg-gradient-to-b from-brand-dark via-gray-900 to-black"></div>
        </div>

        <div id="header" class="relative z-30 pt-12 pb-4 px-6 flex justify-between items-center bg-brand-dark/80 backdrop-blur-md border-b border-white/5">
            <button onclick="window.location.href='price-alert.html'" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10">
                <i class="fa-solid fa-chevron-left text-white/70"></i>
            </button>
            <span class="text-sm font-semibold tracking-wider text-white uppercase">Add Alert</span>
            <div class="w-10 h-10"></div>
        </div>

        <main class="relative z-10 flex-1 overflow-y-auto w-full hide-scrollbar pb-24">
            <div class="px-4 space-y-4 pt-4">
                
                <!-- Step 1: Search Product -->
                <div>
                    <label for="product-search" class="text-sm font-semibold text-white/90 uppercase tracking-wide">Product</label>
                    <div class="relative mt-2">
                        <input type="text" id="product-search" placeholder="Search for a product" class="w-full h-12 bg-white/5 border border-white/10 rounded-xl pl-10 pr-4 text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-brand-primary/50">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                            <i class="fa-solid fa-magnifying-glass text-white/40"></i>
                        </div>
                    </div>
                    <div id="search-results" class="absolute w-full bg-brand-dark border border-white/10 rounded-xl mt-1 z-20 max-h-60 overflow-y-auto hide-scrollbar">
                        <!-- Search results will be injected here -->
                    </div>
                </div>

                <!-- Selected Product Preview (hidden by default) -->
                <div id="selected-product" class="hidden glass-card rounded-xl p-3 flex gap-3 items-center">
                    <div class="w-16 h-16 rounded-lg bg-white/5 border border-white/10 flex-shrink-0">
                        <img id="selected-product-image" class="w-full h-full object-contain" src="" alt="">
                    </div>
                    <div class="flex-1">
                        <h4 id="selected-product-name" class="font-semibold text-white text-sm"></h4>
                        <p class="text-xs text-brand-muted mt-1">Current Price: <span id="selected-product-price" class="font-bold text-white"></span></p>
                    </div>
                    <button id="remove-selection-btn" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20">
                        <i class="fa-solid fa-xmark text-xs text-white/50"></i>
                    </button>
                </div>

                <!-- Step 2: Set Price -->
                <div>
                    <label for="target-price" class="text-sm font-semibold text-white/90 uppercase tracking-wide">Target Price</label>
                    <div class="relative mt-2">
                        <input type="text" id="target-price" placeholder="R$ 0,00" class="w-full h-12 bg-white/5 border border-white/10 rounded-xl pl-4 pr-4 text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-brand-primary/50">
                    </div>
                </div>

                <!-- Step 3: Save Button -->
                <div class="pt-4">
                    <button onclick="saveAlert()" class="w-full h-12 bg-brand-accent text-white font-bold rounded-xl hover:bg-opacity-90 transition-opacity flex items-center justify-center gap-2">
                        <i class="fa-solid fa-check"></i>
                        <span>Save Alert</span>
                    </button>
                </div>

            </div>
        </main>

        <!-- Success Message -->
        <div id="success-message" class="hidden absolute inset-0 z-50 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4">
            <div class="glass-card rounded-2xl p-8 flex flex-col items-center gap-4 text-center">
                <div class="w-16 h-16 rounded-full bg-green-500/20 flex items-center justify-center">
                    <i class="fa-solid fa-check text-3xl text-green-400"></i>
                </div>
                <h3 class="text-xl font-bold text-white">Alert Created!</h3>
                <p class="text-sm text-white/70">We'll notify you when the price drops.</p>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 right-0 h-[80px] bg-black/40 backdrop-blur-xl border-t border-white/10 flex items-center justify-between px-6 pb-2 z-40">
            <button onclick="window.location.href='scan.html'" class="flex-1 flex flex-col items-center justify-center gap-1 h-full text-white/50 hover:text-white transition-colors">
                <i class="fa-solid fa-expand text-xl"></i>
                <span class="text-[10px] font-medium">Scan</span>
            </button>
            <button onclick="window.location.href='search.html'" class="flex-1 flex flex-col items-center justify-center gap-1 h-full text-white/50 hover:text-white transition-colors">
                <i class="fa-solid fa-magnifying-glass text-xl"></i>
                <span class="text-[10px] font-medium">Search</span>
            </button>
            <button onclick="window.location.href='history.html'" class="flex-1 flex flex-col items-center justify-center gap-1 h-full text-white/50 hover:text-white transition-colors">
                <i class="fa-solid fa-clock-rotate-left text-xl"></i>
                <span class="text-[10px] font-medium">History</span>
            </button>
            <button onclick="window.location.href='profile.html'" class="flex-1 flex flex-col items-center justify-center gap-1 h-full text-brand-primary">
                <div class="w-6 h-6 rounded-full bg-white/20 overflow-hidden border-2 border-brand-primary">
                    <img class="w-full h-full object-cover" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/2ddcd57b42-cef58db7c62a5f990a82.png" alt="Profile" />
                </div>
                <span class="text-[10px] font-semibold">Profile</span>
            </button>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/plentz/jquery-maskmoney@master/dist/jquery.maskMoney.min.js"></script>
    <script>
        const mockProducts = [
            { id: 1, name: 'Sony WH-1000XM5', price: 'R$ 2.899,99', image: 'https://storage.googleapis.com/uxpilot-auth.appspot.com/6a72ced7af-4be359f0ffb2701da65e.png' },
            { id: 2, name: 'Apple iPhone 15 Pro', price: 'R$ 7.999,00', image: 'https://storage.googleapis.com/uxpilot-auth.appspot.com/6a72ced7af-4be359f0ffb2701da65e.png' },
            { id: 3, name: 'Samsung Galaxy S24 Ultra', price: 'R$ 8.499,00', image: 'https://storage.googleapis.com/uxpilot-auth.appspot.com/6a72ced7af-4be359f0ffb2701da65e.png' },
            { id: 4, name: 'Dell XPS 15 Laptop', price: 'R$ 12.500,00', image: 'https://storage.googleapis.com/uxpilot-auth.appspot.com/6a72ced7af-4be359f0ffb2701da65e.png' },
            { id: 5, name: 'LG C3 65" OLED TV', price: 'R$ 9.999,00', image: 'https://storage.googleapis.com/uxpilot-auth.appspot.com/6a72ced7af-4be359f0ffb2701da65e.png' },
        ];

        const searchInput = document.getElementById('product-search');
        const searchResultsContainer = document.getElementById('search-results');
        const selectedProductContainer = document.getElementById('selected-product');
        const selectedProductName = document.getElementById('selected-product-name');
        const selectedProductPrice = document.getElementById('selected-product-price');
        const selectedProductImage = document.getElementById('selected-product-image');
        const removeSelectionBtn = document.getElementById('remove-selection-btn');
        const successMessage = document.getElementById('success-message');

        searchInput.addEventListener('input', () => {
            const query = searchInput.value.toLowerCase();
            searchResultsContainer.innerHTML = '';

            if (query.length < 2) {
                searchResultsContainer.classList.add('hidden');
                return;
            }

            const filteredProducts = mockProducts.filter(p => p.name.toLowerCase().includes(query));
            
            if (filteredProducts.length > 0) {
                searchResultsContainer.classList.remove('hidden');
                filteredProducts.forEach(product => {
                    const item = document.createElement('div');
                    item.className = 'p-3 hover:bg-white/5 cursor-pointer border-b border-white/5';
                    item.innerHTML = `<span class="text-sm">${product.name}</span>`;
                    item.onclick = () => selectProduct(product);
                    searchResultsContainer.appendChild(item);
                });
            } else {
                searchResultsContainer.classList.add('hidden');
            }
        });

        function selectProduct(product) {
            selectedProductName.textContent = product.name;
            selectedProductPrice.textContent = product.price;
            selectedProductImage.src = product.image;
            selectedProductImage.alt = product.name;
            
            selectedProductContainer.classList.remove('hidden');
            searchResultsContainer.classList.add('hidden');
            searchInput.value = '';
            searchInput.parentElement.parentElement.classList.add('hidden'); // Hide search input section
        }

        removeSelectionBtn.addEventListener('click', () => {
            selectedProductContainer.classList.add('hidden');
            searchInput.parentElement.parentElement.classList.remove('hidden'); // Show search input section
        });

        function saveAlert() {
            // Basic validation
            if (selectedProductContainer.classList.contains('hidden') || !$('#target-price').maskMoney('unmasked')[0] > 0) {
                alert('Please select a product and set a target price.');
                return;
            }
            successMessage.classList.remove('hidden');
            setTimeout(() => {
                window.location.href = 'price-alert.html';
            }, 2000); // Wait 2 seconds before redirecting
        }

        $(function() {
            $('#target-price').maskMoney({
                prefix: 'R$ ',
                allowNegative: false,
                thousands: '.',
                decimal: ',',
                affixesStay: true
            });
        })
    </script>
</body>
</html>
