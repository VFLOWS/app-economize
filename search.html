<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Economizy - Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0F172A',
                            primary: '#B46445',
                            secondary: '#F5F2EF',
                            accent: '#3B82F6',
                            surface: '#FFFFFF',
                            text: '#1E293B',
                            muted: '#94A3B8',
                            error: '#EF4444',
                            success: '#10B981',
                            warning: '#F59E0B'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-black font-sans text-white h-screen overflow-hidden flex flex-col items-center justify-center">

    <div id="app-container" class="w-full h-full md:max-w-[480px] md:max-h-[850px] md:h-[90vh] bg-brand-dark md:rounded-[40px] shadow-2xl overflow-hidden relative flex flex-col">
        
        <div class="absolute inset-0 z-0 pointer-events-none">
            <div class="absolute inset-0 bg-gradient-to-b from-brand-dark via-gray-900 to-black"></div>
        </div>

        <div id="header" class="relative z-30 pt-12 pb-4 px-6 bg-brand-dark/80 backdrop-blur-md border-b border-white/5">
            <div class="relative">
                <input type="text" id="search-input" placeholder="Search by product name or barcode" class="w-full h-12 bg-white/5 border border-white/10 rounded-xl pl-10 pr-4 text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-brand-primary/50">
                <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                    <i class="fa-solid fa-magnifying-glass text-white/40"></i>
                </div>
            </div>
        </div>

        <main class="relative z-10 flex-1 overflow-y-auto w-full hide-scrollbar pb-24">
            <div id="search-results-container" class="px-4 space-y-3 pt-4">
                <!-- Search results will be injected here -->
                <div id="default-view" class="space-y-4">
                    <h3 class="text-sm font-semibold text-white/90 uppercase tracking-wide">Recent Searches</h3>
                    
                    <!-- Recent Search Item -->
                    <div class="glass-card rounded-xl p-3 flex gap-3 items-center">
                        <i class="fa-solid fa-clock-rotate-left text-white/50"></i>
                        <p class="flex-1 text-white">Sony WH-1000XM5</p>
                        <button class="w-6 h-6 flex items-center justify-center text-white/40 hover:text-white">
                            <i class="fa-solid fa-xmark text-xs"></i>
                        </button>
                    </div>

                    <!-- Placeholder for search results -->
                    <div class="pt-6 text-center">
                        <i class="fa-solid fa-keyboard text-4xl text-white/20"></i>
                        <p class="mt-4 text-sm text-white/60">Enter a product name to begin searching.</p>
                    </div>
                </div>
            </div>
        </main>

        <div class="absolute bottom-0 left-0 right-0 h-[80px] bg-black/40 backdrop-blur-xl border-t border-white/10 flex items-center justify-between px-6 pb-2 z-50">
            <button onclick="window.location.href='scan.html'" class="flex-1 flex flex-col items-center justify-center gap-1 h-full text-white/50 hover:text-white transition-colors">
                <i class="fa-solid fa-expand text-xl"></i>
                <span class="text-[10px] font-medium">Scan</span>
            </button>
            <button onclick="window.location.href='search.html'" class="flex-1 flex flex-col items-center justify-center gap-1 h-full text-brand-primary">
                <i class="fa-solid fa-magnifying-glass text-xl"></i>
                <span class="text-[10px] font-semibold">Search</span>
            </button>
            <button onclick="window.location.href='history.html'" class="flex-1 flex flex-col items-center justify-center gap-1 h-full text-white/50 hover:text-white transition-colors">
                <i class="fa-solid fa-clock-rotate-left text-xl"></i>
                <span class="text-[10px] font-medium">History</span>
            </button>
            <button onclick="window.location.href='wallet.html'" class="flex-1 flex flex-col items-center justify-center gap-1 h-full text-white/50 hover:text-white transition-colors">
                <i class="fa-solid fa-wallet text-xl"></i>
                <span class="text-[10px] font-medium">Wallet</span>
            </button>
            <button onclick="window.location.href='profile.html'" class="flex-1 flex flex-col items-center justify-center gap-1 h-full text-white/50 hover:text-white transition-colors">
                <div class="w-6 h-6 rounded-full bg-white/20 overflow-hidden border border-white/10">
                    <img class="w-full h-full object-cover" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/2ddcd57b42-cef58db7c62a5f990a82.png" alt="Profile" />
                </div>
                <span class="text-[10px] font-medium">Profile</span>
            </button>
        </div>
    </div>
    <script>
        const searchInput = document.getElementById('search-input');
        const resultsContainer = document.getElementById('search-results-container');
        const defaultView = document.getElementById('default-view');

        const mockProducts = [
            { name: 'Sony WH-1000XM5 Headphones', category: 'Electronics', img: 'https://storage.googleapis.com/uxpilot-auth.appspot.com/6a72ced7af-4be359f0ffb2701da65e.png' },
            { name: 'Apple iPhone 15 Pro', category: 'Smartphones', img: 'https://storage.googleapis.com/uxpilot-auth.appspot.com/d57ec656e3-7a73e702a69b43a89b40.png' },
            { name: 'Samsung Galaxy S24 Ultra', category: 'Smartphones', img: 'https://storage.googleapis.com/uxpilot-auth.appspot.com/97f339d9ae-baa29945a94cc12de144.png' },
            { name: 'Logitech MX Master 3S Mouse', category: 'Accessories', img: 'https://storage.googleapis.com/uxpilot-auth.appspot.com/63b62e5bdc-22ccf4bd6c74c66410b0.png' },
            { name: 'NVIDIA GeForce RTX 4090', category: 'PC Components', img: 'https://storage.googleapis.com/uxpilot-auth.appspot.com/3cda3e5853-2f478ed0dff562e4ba39.png' },
            { name: 'Nintendo Switch OLED', category: 'Gaming', img: 'https://storage.googleapis.com/uxpilot-auth.appspot.com/2ddcd57b42-cef58db7c62a5f990a82.png' }
        ];

        function renderResults(products) {
            defaultView.style.display = 'none';
            // Clear previous results except for the default view
            resultsContainer.innerHTML = '';
            resultsContainer.appendChild(defaultView);


            if (products.length === 0) {
                resultsContainer.innerHTML += `
                    <div class="pt-6 text-center">
                        <i class="fa-solid fa-box-open text-4xl text-white/20"></i>
                        <p class="mt-4 text-sm text-white/60">No products found for your search.</p>
                    </div>
                `;
                return;
            }

            const productListHtml = products.map(product => `
                <div onclick="window.location.href='scan-complete.html'" class="glass-card rounded-xl p-3 flex gap-3 items-center cursor-pointer hover:bg-white/10 transition-colors">
                    <div class="w-16 h-16 rounded-lg bg-white/5 border border-white/10 flex-shrink-0">
                        <img class="w-full h-full object-contain" src="${product.img}" alt="${product.name}">
                    </div>
                    <div class="flex-1">
                        <h4 class="font-semibold text-white text-sm">${product.name}</h4>
                        <p class="text-xs text-brand-muted mt-1">${product.category}</p>
                    </div>
                    <button class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center">
                        <i class="fa-solid fa-chevron-right text-xs text-white/50"></i>
                    </button>
                </div>
            `).join('');

            resultsContainer.innerHTML += productListHtml;
        }

        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();

            if (searchTerm.length < 2) {
                defaultView.style.display = 'block';
                // Clear previous results
                const existingResults = resultsContainer.querySelectorAll('.glass-card');
                existingResults.forEach(el => {
                    if(!el.querySelector('.fa-clock-rotate-left')) el.remove()
                });
                const noProducts = resultsContainer.querySelector('.pt-6.text-center');
                if(noProducts && !noProducts.querySelector('.fa-keyboard')) noProducts.remove();
                return;
            }

            const filteredProducts = mockProducts.filter(product => 
                product.name.toLowerCase().includes(searchTerm)
            );

            renderResults(filteredProducts);
        });
    </script>
</body>
</html>
