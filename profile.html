<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Economizy - Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0F172A',
                            primary: '#B46445',
                            secondary: '#F5F2EF',
                            accent: '#3B82F6',
                            surface: '#FFFFFF',
                            text: '#1E293B',
                            muted: '#94A3B8',
                            error: '#EF4444',
                            success: '#10B981',
                            warning: '#F59E0B'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-black font-sans text-white h-screen overflow-hidden flex flex-col items-center justify-center">

    <div id="app-container" class="w-full h-full md:max-w-[480px] md:max-h-[850px] md:h-[90vh] bg-brand-dark md:rounded-[40px] shadow-2xl overflow-hidden relative flex flex-col">
        
        <div class="absolute inset-0 z-0 pointer-events-none">
            <div class="absolute inset-0 bg-gradient-to-b from-brand-dark via-gray-900 to-black"></div>
        </div>

        <div id="header" class="relative z-30 pt-12 pb-4 px-6 bg-brand-dark/80 backdrop-blur-md border-b border-white/5 flex justify-center items-center">
            <span class="text-sm font-semibold tracking-wider text-white uppercase">Profile</span>
        </div>

        <main class="relative z-10 flex-1 overflow-y-auto w-full hide-scrollbar pb-24">
            <div class="px-4 space-y-6 pt-6">
                
                <!-- Profile Header -->
                <div class="flex flex-col items-center text-center">
                    <div class="relative mb-3">
                        <div class="w-24 h-24 rounded-full bg-white/10 border-2 border-white/20 overflow-hidden">
                            <img class="w-full h-full object-cover" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/2ddcd57b42-cef58db7c62a5f990a82.png" alt="Profile Picture">
                        </div>
                        <button class="absolute bottom-0 right-0 w-7 h-7 bg-brand-accent text-white rounded-full flex items-center justify-center border-2 border-brand-dark">
                            <i class="fa-solid fa-pen text-xs"></i>
                        </button>
                    </div>
                    <h2 class="text-xl font-bold text-white">Vinicius S.</h2>
                    <p class="text-sm text-brand-muted">vinicius@vflows.com.br</p>
                </div>

                <!-- Settings Group 1 -->
                <div class="glass-card rounded-xl">
                    <a href="wallet.html" class="p-4 flex items-center justify-between border-b border-white/5 hover:bg-white/5 transition-colors rounded-t-xl">
                        <div class="flex items-center gap-4">
                            <i class="fa-solid fa-wallet text-brand-muted w-5 text-center"></i>
                            <span class="text-white">My Wallet</span>
                        </div>
                        <i class="fa-solid fa-chevron-right text-xs text-brand-muted"></i>
                    </a>
                    <a href="#" class="p-4 flex items-center justify-between border-b border-white/5 hover:bg-white/5 transition-colors">
                        <div class="flex items-center gap-4">
                            <i class="fa-solid fa-user-cog text-brand-muted w-5 text-center"></i>
                            <span class="text-white">Account Settings</span>
                        </div>
                        <i class="fa-solid fa-chevron-right text-xs text-brand-muted"></i>
                    </a>
                    <a href="price-alert.html" class="p-4 flex items-center justify-between border-b border-white/5 hover:bg-white/5 transition-colors">
                        <div class="flex items-center gap-4">
                            <i class="fa-solid fa-bell text-brand-muted w-5 text-center"></i>
                            <span class="text-white">Price Alerts</span>
                        </div>
                        <i class="fa-solid fa-chevron-right text-xs text-brand-muted"></i>
                    </a>
                    <a href="#" class="p-4 flex items-center justify-between hover:bg-white/5 transition-colors rounded-b-xl">
                        <div class="flex items-center gap-4">
                            <i class="fa-solid fa-shield-halved text-brand-muted w-5 text-center"></i>
                            <span class="text-white">Privacy & Security</span>
                        </div>
                        <i class="fa-solid fa-chevron-right text-xs text-brand-muted"></i>
                    </a>
                </div>

                <!-- Settings Group 2 -->
                <div class="glass-card rounded-xl">
                    <a href="#" class="p-4 flex items-center justify-between border-b border-white/5 hover:bg-white/5 transition-colors rounded-t-xl">
                        <div class="flex items-center gap-4">
                            <i class="fa-solid fa-circle-question text-brand-muted w-5 text-center"></i>
                            <span class="text-white">Help & Support</span>
                        </div>
                        <i class="fa-solid fa-chevron-right text-xs text-brand-muted"></i>
                    </a>
                    <a href="#" class="p-4 flex items-center justify-between hover:bg-white/5 transition-colors rounded-b-xl">
                        <div class="flex items-center gap-4">
                            <i class="fa-solid fa-info-circle text-brand-muted w-5 text-center"></i>
                            <span class="text-white">About</span>
                        </div>
                        <i class="fa-solid fa-chevron-right text-xs text-brand-muted"></i>
                    </a>
                </div>

                <!-- Logout -->
                <div class="glass-card rounded-xl">
                    <button onclick="window.location.href='login.html'" class="w-full p-4 flex items-center justify-center gap-3 text-brand-error hover:bg-brand-error/10 transition-colors rounded-xl">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                        <span class="font-semibold">Logout</span>
                    </button>
                </div>

            </div>
        </main>

        <div class="absolute bottom-0 left-0 right-0 h-[80px] bg-black/40 backdrop-blur-xl border-t border-white/10 flex items-center justify-between px-6 pb-2 z-50">
            <button onclick="window.location.href='scan.html'" class="flex-1 flex flex-col items-center justify-center gap-1 h-full text-white/50 hover:text-white transition-colors">
                <i class="fa-solid fa-expand text-xl"></i>
                <span class="text-[10px] font-medium">Scan</span>
            </button>
            <button onclick="window.location.href='search.html'" class="flex-1 flex flex-col items-center justify-center gap-1 h-full text-white/50 hover:text-white transition-colors">
                <i class="fa-solid fa-magnifying-glass text-xl"></i>
                <span class="text-[10px] font-medium">Search</span>
            </button>
            <button onclick="window.location.href='history.html'" class="flex-1 flex flex-col items-center justify-center gap-1 h-full text-white/50 hover:text-white transition-colors">
                <i class="fa-solid fa-clock-rotate-left text-xl"></i>
                <span class="text-[10px] font-medium">History</span>
            </button>
            <button onclick="window.location.href='wallet.html'" class="flex-1 flex flex-col items-center justify-center gap-1 h-full text-white/50 hover:text-white transition-colors">
                <i class="fa-solid fa-wallet text-xl"></i>
                <span class="text-[10px] font-medium">Wallet</span>
            </button>
            <button onclick="window.location.href='profile.html'" class="flex-1 flex flex-col items-center justify-center gap-1 h-full text-brand-primary">
                <div class="w-6 h-6 rounded-full bg-white/20 overflow-hidden">
                    <img class="w-full h-full object-cover" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/2ddcd57b42-cef58db7c62a5f990a82.png" alt="Profile" />
                </div>
                <span class="text-[10px] font-semibold">Profile</span>
            </button>
        </div>
    </div>
</body>
</html>
